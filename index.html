# Scenario 
### In this assignment, you’ll build a responsive static website to convert between metric units and imperial units (i.e., between kilograms and pounds, kilometres and miles, and Celsius and Fahrenheit).  

# Equipment and Materials 
### For this assignment, you will need: 
 - Visual Studio Code 
 - Tailwind CSS Play CDN 
 - Internet browser 

# Instructions 
### 1. Before you start, review the Scenario and Marking Criteria sections, and then read all the instructions. 
### 2. Working in groups, as indicated by your instructor, review the mathematical equations required to perform the following unit conversions: 
 - Pounds (lb.) to kilograms (kg), and vice versa 
 - Miles to kilometres (km), and vice versa 
 - Celsius (°C) to Fahrenheit (°F), and vice versa  
### 3. Create a higher-order JavaScript function that takes in two parameters:  
 - The unit of measurement to convert from 
 - The unit of measurement to convert to 
### The function should return a conversion function that uses arrow notation to perform the conversion. The conversion function should take in a single value or an array of values and return the converted value or array of converted values. 
### 4. Develop a basic static website that uses the JavaScript conversion functions you created. 
### Website requirements: 
 - The website must be made responsive using Tailwind CSS. 
 - Create three tabs within the navbar of the website: Weight, Distance and Temperature. 
   - Each tab must have a form to convert from the metric unit to the imperial unit, and vice versa.
   - The form must contain the functionality to convert a single value and an array list of values. 
 - Use Tailwind CSS for all the components on the website (e.g., navbar, tabs, forms) 
### 5. Deploy the website. 
### 6. Submit the following to Brightspace by the posted due date: 
 - A link to your GitHub repository 
 - A link to your deployed website

<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Javascript and Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>
<body class="bg-slate-100">
    <main>
        <!-- Header -->
        <div class="p-20 flex justify-center items-center bg-slate-600">
            <h1 class="text-center font-mono font-extrabold text-3xl text-gray-200
                text-3xl md:text-4xl lg:text-4xl xl:text-5xl">
                Advanced Javascript and Tailwind CSS
            </h1>
        </div>

        <!-- First Box -->
        <section>
            <nav class="flex items-center justify-between border border-4 border-slate-900 mt-3 mx-3 rounded-md">
                <span class="text-sm sm:text-lg font-bold text-slate-900 pl-2 truncate">
                    Conversion: 
                </span>
                <div class="hidden lg:flex items-center gap-6">
                    <a href="#" id="btn-weight" class="text-lg text-slate-600 hover:text-white hover:bg-slate-500 button-tag font-semibold p-2">Weight</a>
                    <a href="#" id="btn-distance" class="text-lg text-slate-600 hover:text-white hover:bg-slate-500 button-tag font-semibold p-2">Distance</a>
                    <a href="#" id="btn-temperature" class="text-lg text-slate-600 hover:text-white hover:bg-slate-500 button-tag font-semibold p-2">Temperature</a>
                </div>

                <button id="id-toggle" class="group flex lg:hidden flex-col gap-1.5 p-2 button-tag hover:bg-slate-500 p-2">
                    <span class="block w-5 h-0.5 bg-slate-900 group-hover:bg-white"></span>
                    <span class="block w-5 h-0.5 bg-slate-900 group-hover:bg-white"></span>
                    <span class="block w-5 h-0.5 bg-slate-900 group-hover:bg-white"></span>
                </button>
            </nav>
            
        </section>

        <!-- Hidden Menu -->
        <section>
            <div id="id-hamburger" class="flex flex-col lg:hidden hidden">
                <a href="#" id="btn-weight" class="text-sm sm:text-lg text-slate-600 font-semibold hover:text-blue-600 button-tag border border-4 border-slate-900 mx-3 p-2 border-t-0 hover:bg-slate-500 hover:text-white">Weight</a>
                <a href="#" id="btn-distance" class="text-sm sm:text-lg text-slate-600 font-semibold hover:text-blue-600 button-tag border border-4 border-slate-900 mx-3 p-2 border-t-0 hover:bg-slate-500 hover:text-white">Distance</a>
                <a href="#" id="btn-temperature" class="text-sm sm:text-lg text-slate-600 font-semibold hover:text-blue-600 button-tag border border-4 border-slate-900 mx-3 p-2 rounded-bl-md rounded-br-md border-t-0 hover:bg-slate-500 hover:text-white">Temperature</a>
            </div>
        </section>

        <!-- Middle Box -->
        <section>
            <div class="border border-4 border-slate-900 mt-2 mx-3 rounded-md">
                <h2 id="operation-id" class="ml-4 mt-2 text-xl font-extrabold pl-2 md:2xl lg:text-3xl xl:text-4xl text-center truncate">Placeholder</h2>
                <form>
                    <div class="flex flex-col items-center">
                        <!-- Input -->
                        <div class="flex flex-col sm:flex-row justify-between gap-2 m-1">
                            <label id="lbl-input" for="id-input" class="text-center sm:text-right w-15 sm:w-24 font-semibold flex-none">Placeholder:</label>
                            <input id="id-input" type="text" class="font-semibold rounded-md focus:bg-slate-300 focus:text-slate-900 focus:placeholder-slate-900 w-full border border-4 border-slate-900 flex-1" placeholder="input"/>
                        </div>

                        <!-- Output -->
                        <div class="flex flex-col sm:flex-row justify-between gap-2 m-1">
                            <label id="lbl-output" for="id-output" class="text-center sm:text-right w-15 sm:w-24 font-semibold flex-none">Placeholder:</label>
                            <input id="id-output" type="text" class="font-semibold rounded-md focus:bg-slate-300 focus:text-slate-900 focus:placeholder-slate-900 w-full border border-4 border-slate-900 flex-1" placeholder="output"/>
                        </div>

                        <!-- Buttons -->
                        <div class="flex flex-col sm:flex-row">
                            <button id="btn-switch" class="button-tag bg-slate-500 text-white border border-4 border-slate-900 rounded-lg hover:bg-white hover:text-slate-500 font-bold p-2 m-2" type="button">
                                Swap                    
                            </button>
                            <button id="btn-convert" class="button-tag bg-slate-500 text-white border border-4 border-slate-900 rounded-lg hover:bg-white hover:text-slate-500 font-bold p-2 m-2" type="submit">

        <!-- Note -->
        <section>
            <div class="border border-4 border-slate-900 m-3 rounded-md">

            </div>
        </section>

    <!-- Footer -->
    <footer class="sm:mt-12 absolute w-full sm:bottom-0">
        <section>
            <div>
                <p class="p-2 font-semibold text-center">Built using Tailwind CSS and Javascript</p>
            </div>
        </section>
    </footer>


    <script>
        // =======================================================
        // Constants
        // =======================================================

        // Operation Modes Enum
        const OPERATION_MODES = Object.freeze({
            WEIGHT: "WEIGHT",
            DISTANCE: "DISTANCE",
            TEMPERATURE: "TEMPERATURE"
        });

        // DOM ids
        const BUTTON_TAG = "button-tag";
        const BUTTON_WEIGHT_ID = "btn-weight";
        const BUTTON_DISTANCE_ID = "btn-distance";
        const BUTTON_TEMPERATURE_ID = "btn-temperature";
        const BUTTON_SWITCH_ID = "btn-switch";
        const BUTTON_CONVERT_ID = "btn-convert";
        const INPUT_ID = "id-input";
        const OUTPUT_ID = "id-output";
        const OPERATION_ID = "operation-id";
        const INPUT_LABEL_ID = "lbl-input";
        const OUTPUT_LABEL_ID = "lbl-output";
        const TOGGLE_ID = "id-toggle";
        const HAMBURGER_ID = "id-hamburger";

        // DOM elements
        const operationLabel = document.getElementById(OPERATION_ID);
        const inputLabel = document.getElementById(INPUT_LABEL_ID);
        const outputLabel = document.getElementById(OUTPUT_LABEL_ID);
        const inputForConversion = document.getElementById(INPUT_ID);
        const outputConverted = document.getElementById(OUTPUT_ID);
        const hamburger = document.getElementById(HAMBURGER_ID);

        // =======================================================
        // End of constants
        // =======================================================

        // variables for the operation
        let operationMode = OPERATION_MODES.WEIGHT; // determines f the operation is about weight, distance, or temperature
        let operation = () => {};                   // function variable
        let swap = true;                            // determines the order of conversion. (e.g. lb2Kg if true or kg2Lb if false)
        
        // =======================================================
        // conversion formulas
        // =======================================================
        
        // =======================================================
        // Pounds to kilograms 
        // =======================================================
        //  Converts pounds to kilogram 
        //  Parameter: Pounds as number
        //  Returns: Kilogram as number
        // =======================================================
        const lb2Kg = (lb) => (lb / 2.20462);
        // =======================================================
        // Kilograms to pounds
        // =======================================================
        //  Converts kilogram to pounds
        //  Parameter: Kilograms as number
        //  Returns: pounds as number
        // =======================================================
        const kg2Lb = (kg) => (kg * 2.20462);
        // =======================================================
        // Miles to kilometers
        // =======================================================
        //  Converts Miles to kilometers
        //  Parameter: Miles as number
        //  Returns: kilometers as number
        // =======================================================
        const miles2Km = (m) => (m * 1.60934);
        // =======================================================
        // Kilometers to miles
        // =======================================================
        //  Converts kilometers to miles
        //  Parameter: Kilometers as number
        //  Returns: miles as number
        // =======================================================
        const km2Miles = (km) => (km * 0.621371);
        // =======================================================
        // Celsius to Fahrenheit
        // =======================================================
        //  Converts Celsius to Fahrenheit
        //  Parameter: Celsius as number
        //  Returns: Fahrenheit as number
        // =======================================================
        const c2F = (c) => (c * 9.0 / 5.0) + 32;
        // =======================================================
        // Fahrenheit to Celsius
        // =======================================================
        //  Converts Fahrenheit to Celsius
        //  Parameter: Fahrenheit as number
        //  Returns: Celsius as number
        // =======================================================
        const f2C = (f) => (f - 32) * 5.0 / 9.0;

        // =======================================================
        // Functions
        // =======================================================

        // =======================================================
        // Higher order function
        // =======================================================
        //  Maps v and executes the operation
        //  Parameters: operation as function
        //              v as an array of numbers
        //  Returns: an array of operated values
        // =======================================================
        function operate(operation, v) {
            return v.map(operation);
        }

        // UI related operations
        const switchLabel = operationMode => {
            if (operationMode == OPERATION_MODES.WEIGHT) {
                operationLabel.textContent = "Weight";                      // Big H2 Label
                inputLabel.textContent = swap ? "Pounds:" : "Kilograms:";   // the label for input
                outputLabel.textContent = swap ? "Kilograms:" : "Pounds:";  // label for output
                operation = swap ? lb2Kg : kg2Lb;                           // flag for the operation
            }
            else if (operationMode == OPERATION_MODES.DISTANCE) {
                operationLabel.textContent = "Distance";
                inputLabel.textContent = swap ? "Miles:" : "Kilometers:";
                outputLabel.textContent = swap ? "Kilometers:" : "Miles:";
                operation = swap ? miles2Km : km2Miles;
            }
            else if (operationMode == OPERATION_MODES.TEMPERATURE) {
                operationLabel.textContent = "Temperature";
                inputLabel.textContent = swap ? "Celsius:" : "Fahrenheit:";
                outputLabel.textContent = swap ? "Fahrenheit:" : "Celsius:";
                operation = swap ? c2F : f2C;
            }
        };

        // Implementation of the functions
        document.querySelectorAll(`.${BUTTON_TAG}`).forEach(element => element.addEventListener("click", (event)=>{
            // store the id of the button clicked
            const id = event.currentTarget.id;

            // if conver button is pressed
            if (id == BUTTON_CONVERT_ID) {
                event.preventDefault();            

                // operate accepts operation and value array
                outputConverted.value = operate(operation, inputForConversion.value.split(",").map(v=> Number(v.trim()))).map(o=>o.toFixed(2));
            }
            else if (id == TOGGLE_ID) {
                hamburger.classList.toggle('hidden');
            }
            else {
                // update operation mode
                if (id == BUTTON_WEIGHT_ID) 
                    operationMode = OPERATION_MODES.WEIGHT;
                else if (id == BUTTON_DISTANCE_ID) 
                    operationMode = OPERATION_MODES.DISTANCE;
                else if (id == BUTTON_TEMPERATURE_ID) 
                    operationMode = OPERATION_MODES.TEMPERATURE;
                else if (id == BUTTON_SWITCH_ID) 
                    swap = !swap;

                // update the ui
                switchLabel(operationMode);
            }
            
        }));    

        // to guarantee that variables are initialized
        (function() {
            switchLabel(operationMode);
        })();
    </script>
</body>
</html>
