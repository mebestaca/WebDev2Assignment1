<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Javascript and Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>
<body>
    <div class="border border-2 border-gray-200 bg-gray-200 p-20 flex justify-center items-center 
        sm:bg-gray-300 md:bg-gray-400 lg:bg-gray-500 xl:bg-gray-600" >
        <h1 class="text-center font-mono font-extrabold text-2xl text-gray-500
            sm:text-gray-400 md:text-gray-300 lg:text-gray-200 xl:text-gray-100
            text-2xl md:text-3xl lg:text-4xl xl:text-5xl">
            Advanced Javascript and Tailwind CSS
        </h1>
    </div>

    <section>
        <nav class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <span class="text-lg font-bold text-gray-900">
                Conversion: 
            </span>
            <div class="hidden lg:flex items-center gap-6">
                <a href="#" id="btn-weight" class="text-sm text-gray-600 hover:text-blue-600 button-tag">Weight</a>
                <a href="#" id="btn-distance" class="text-sm text-gray-600 hover:text-blue-600 button-tag">Distance</a>
                <a href="#" id="btn-temperature" class="text-sm text-gray-600 hover:text-blue-600 button-tag">Temperature</a>
            </div>

            <button class="flex lg:hidden flex-col gap-1.5 p-2">
                <span class="block w-5 h-0.5 bg-gray-600"></span>
                <span class="block w-5 h-0.5 bg-gray-600"></span>
                <span class="block w-5 h-0.5 bg-gray-600"></span>
            </button>
        </nav>
        
    </section>

    <section>
        <div class="flex flex-col gap-2">
            <a href="#" id="btn-weight" class="text-sm text-gray-600 hover:text-blue-600 button-tag border border-2">Weight</a>
            <a href="#" id="btn-distance" class="text-sm text-gray-600 hover:text-blue-600 button-tag border border-2">Distance</a>
            <a href="#" id="btn-temperature" class="text-sm text-gray-600 hover:text-blue-600 button-tag border border-2">Temperature</a>
        </div>
    </section>

    <section>
        <h2 id="operation-id" class="mx-2 mx-2 text-4xl">Placeholder</h2>
        <form class="mx-4 my-4">
            <div class="border border-2 h-full bg-blue-100">
                <div>
                    <label id="lbl-input" for="input" class="block">Placeholder:</label>
                    <input id="id-input" type="text" class="block"/>
                </div>
                <div>
                    <label id="lbl-output" for="output" class="block">Placeholder:</label>
                    <input id="id-output" type="text" class="block"/>
                </div>
                <div class="flex">
                    <button id="btn-switch" class="px-4 py-2 font-bold text-white bg-blue-500 rounded hover:bg-blue-700 button-tag" type="button">
                        Swap                    
                    </button>
                    <button id="btn-convert" class="px-4 py-2 font-bold text-white bg-blue-500 rounded hover:bg-blue-700 button-tag" type="submit">
                        Convert
                    </button>
                </div>
            </div>
        </form>
    </section>

    <script>
        const OPERATION_MODES = Object.freeze({
            WEIGHT: "WEIGHT",
            DISTANCE: "DISTANCE",
            TEMPERATURE: "TEMPERATURE"
        });

        const BUTTON_TAG = "button-tag";
        const BUTTON_WEIGHT_ID = "btn-weight";
        const BUTTON_DISTANCE_ID = "btn-distance";
        const BUTTON_TEMPERATURE_ID = "btn-temperature";
        const BUTTON_SWITCH_ID = "btn-switch";
        const BUTTON_CONVERT_ID = "btn-convert";
        const INPUT_ID = "id-input";
        const OUTPUT_ID = "id-output";
        const OPERATION_ID = "operation-id";
        const INPUT_LABEL_ID = "lbl-input";
        const OUTPUT_LABEL_ID = "lbl-output";

        let operationMode = OPERATION_MODES.WEIGHT;
        let operation = () => {};
        let swap = true;
        const operationLabel = document.getElementById(OPERATION_ID);
        const inputLabel = document.getElementById(INPUT_LABEL_ID);
        const outputLabel = document.getElementById(OUTPUT_LABEL_ID);
        const inputForConversion = document.getElementById(INPUT_ID);
        const outputConverted = document.getElementById(OUTPUT_ID);

        const lbToKg = (lb) => (lb / 2.20462);
        const kgToLb = (kg) => (kg * 2.20462);

        const milesToKm = (m) => (m * 1.60934);
        const kmToMiles = (km) => (km * 0.621371);

        const cToF = (c) => (c * 9.0 / 5.0) + 32;
        const fToC = (f) => (f - 32) * 5.0 / 9.0;

        function operate(operation, v) {
            return v.map(operation);
        }

        const switchLabel = operationMode => {
            if (operationMode == OPERATION_MODES.WEIGHT) {
                operationLabel.textContent = "Weight";
                inputLabel.textContent = swap ? "Pounds" : "Kilograms";
                outputLabel.textContent = swap ? "Kilograms" : "Pounds";
                operation = swap ? lbToKg : kgToLb;
            }
            else if (operationMode == OPERATION_MODES.DISTANCE) {
                operationLabel.textContent = "Distance";
                inputLabel.textContent = swap ? "Miles" : "Kilometers";
                outputLabel.textContent = swap ? "Kilometers" : "Miles";
                operation = swap ? milesToKm : kmToMiles;
            }
            else if (operationMode == OPERATION_MODES.TEMPERATURE) {
                operationLabel.textContent = "Temperature";
                inputLabel.textContent = swap ? "Celsius" : "Fahrenheit";
                outputLabel.textContent = swap ? "Fahrenheit" : "Celsius";
                operation = swap ? cToF : fToC;
            }
        };

        document.querySelectorAll(`.${BUTTON_TAG}`).forEach(element => element.addEventListener("click", (event)=>{
            const id = event.target.id;

            if (id == BUTTON_CONVERT_ID) {
                event.preventDefault();            
                outputConverted.value = operate(operation, inputForConversion.value.split(",").map(v=> Number(v.trim()))).map(o=>o.toFixed(2));
            }
            else {
                if (id == BUTTON_WEIGHT_ID) 
                    operationMode = OPERATION_MODES.WEIGHT;
                else if (id == BUTTON_DISTANCE_ID) 
                    operationMode = OPERATION_MODES.DISTANCE;
                else if (id == BUTTON_TEMPERATURE_ID) 
                    operationMode = OPERATION_MODES.TEMPERATURE;
                else if (id == BUTTON_SWITCH_ID) 
                    swap = !swap;
                switchLabel(operationMode);
            }
            
        }));    

        (function() {
            switchLabel(operationMode);
        })();
    </script>
</body>
</html>
