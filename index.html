Two-Way Metric Imperial Unit Converter Website

This responsive website allows users to convert between weight, distance, and temperature units.
Users can enter either a single value or multiple comma-separated values.
Javascript handles the conversion calculations while Tailwind CSS provides the responsive layout and styling.

===============================================================================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Way Metric Imperial Unit Converter</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#FFF0C7] min-h-screen">

    <!--Navigation Bar-->
    <nav class="bg-[#FFA552] text-black shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-center space-x-5 py-4">
                <button class="tab-btn text-2xl px-4 py-2 rounded hover:bg-[#FFF0C7]" data-tab="weight">
                    Weight
                </button>

                <button class="tab-btn text-2xl px-4 py-2 rounded hover:bg-[#FFF0C7]" data-tab="distance">
                    Distance
                </button>

                <button class="tab-btn text-2xl px-4 py-2 rounded hover:bg-[#FFF0C7]" data-tab="temperature">
                    Temperature
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">

        <!--Weight Converter Page-->
        <section id="weight" class="tab-content">
            <h2 class="text-4xl font-bold mb-6 text-center">
                Weight Converter
            </h2>

            <div class="flex flex-col items-center gap-6">

                <!--Pounds to Kilograms form-->
                <div class="bg-[#FDAC68] p-6 rounded-lg shadow w-full max-w-md">
                    <h3 class="font-semibold mb-4">Pounds(lb.) to Kilograms(kg)</h3>

                    <input
                        id="lbInput"
                        type="text"
                        placeholder="Example: 175 or 175, 180, 185"
                        class="w-full border p-3 rounded mb-4"
                    >

                    <!--Convert button-->
                    <button
                        onclick="handleConversion('lb','kg','lbInput','lbResult')"
                        class="bg-[#B34E00] text-white px-4 py-2 rounded w-full">
                        Convert
                    </button>

                    <p id="lbResult" class="mt-4"></p>
                </div>

                <!--Kilograms to Pounds form-->
                <div class="bg-[#FDAC68] p-6 rounded-lg shadow w-full max-w-md">
                    <h3 class="font-semibold mb-4">Kilograms(kg) to Pounds(lb.)</h3>

                    <input
                        id="kgInput"
                        type="text"
                        placeholder="Example: 64 or 64, 68, 73"
                        class="w-full border p-3 rounded mb-4"
                    >

                    <!--Convert button-->
                    <button
                        onclick="handleConversion('kg','lb','kgInput','kgResult')"
                        class="bg-[#B34E00] text-white px-4 py-2 rounded w-full">
                        Convert
                    </button>

                    <p id="kgResult" class="mt-4"></p>
                </div>

            </div>
        </section>

        <!--Distance Converter Page-->
        <section id="distance" class="tab-content hidden">
            <h2 class="text-4xl font-bold mb-6 text-center">
                Distance Converter
            </h2>

            <div class="flex flex-col items-center gap-6">

                <!--Miles to Kilometers form-->
                <div class="bg-[#FDAC68] p-6 rounded-lg shadow w-full max-w-md">
                    <h3 class="font-semibold mb-4">Miles(mi.) to Kilometers(km.)</h3>

                    <input
                        id="mileInput"
                        type="text"
                        placeholder="Example: 15 or 15, 20, 25"
                        class="w-full border p-3 rounded mb-4"
                    >

                    <!--Convert button-->
                    <button
                        onclick="handleConversion('mile','km','mileInput','mileResult')"
                        class="bg-[#B34E00] text-white px-4 py-2 rounded w-full">
                        Convert
                    </button>

                    <p id="mileResult" class="mt-4"></p>
                </div>

                <!--Kilometers to Miles form-->
                <div class="bg-[#FDAC68] p-6 rounded-lg shadow w-full max-w-md">
                    <h3 class="font-semibold mb-4">Kilometers(km.) to Miles(mi.)</h3>

                    <input
                        id="kmInput"
                        type="text"
                        placeholder="Example: 7 or 7, 14, 21"
                        class="w-full border p-3 rounded mb-4"
                    >

                    <!--Convert button-->
                    <button
                        onclick="handleConversion('km','mile','kmInput','kmResult')"
                        class="bg-[#B34E00] text-white px-4 py-2 rounded w-full">
                        Convert
                    </button>

                    <p id="kmResult" class="mt-4"></p>
                </div>

            </div>
        </section>

        <!--Temperature Converter Page-->
        <section id="temperature" class="tab-content hidden">
            <h2 class="text-4xl font-bold mb-6 text-center">
                Temperature Converter
            </h2>

            <div class="flex flex-col items-center gap-6">

                <!--Celsius to Fahrenheit form-->
                <div class="bg-[#FDAC68] p-6 rounded-lg shadow w-full max-w-md">
                    <h3 class="font-semibold mb-4">Celsius(°C) to Fahrenheit(°F)</h3>

                    <input
                        id="cInput"
                        type="text"
                        placeholder="Example: 0 or 0, -5, -10"
                        class="w-full border p-3 rounded mb-4"
                    >

                    <!--Convert button-->
                    <button
                        onclick="handleConversion('c','f','cInput','cResult')"
                        class="bg-[#B34E00] text-white px-4 py-2 rounded w-full">
                        Convert
                    </button>

                    <p id="cResult" class="mt-4"></p>
                </div>

                <!--Fahrenheit to Celsius form-->
                <div class="bg-[#FDAC68] p-6 rounded-lg shadow w-full max-w-md">
                    <h3 class="font-semibold mb-4">Fahrenheit(°F) to Celsius(°C)</h3>

                    <input
                        id="fInput"
                        type="text"
                        placeholder="Example: 32 or 32, 44, 55"
                        class="w-full border p-3 rounded mb-4"
                    >

                    <!--Convert button-->
                    <button
                        onclick="handleConversion('f','c','fInput','fResult')"
                        class="bg-[#B34E00] text-white px-4 py-2 rounded w-full">
                        Convert
                    </button>

                    <p id="fResult" class="mt-4"></p>
                </div>
            </div>
        </section>
    </main>

    <script src ="script.js"></script>
</body>
</html>
